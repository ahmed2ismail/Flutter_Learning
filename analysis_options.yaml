# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
# include: package:flutter_lints/flutter.yaml

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.

  rules:
    # prefer_const_constructors: true  # تظهر خطًا أزرق تحت الويدجتس التي يمكن أن تكون ثابتة (const).
    # prefer_const_literals_to_create_immutables: true # تظهر خطًا أزرق تحت القوائم والمجموعات التي يمكن أن تكون ثابتة (const).
    # prefer_const_declarations: true # تظهر خطًا أزرق تحت المتغيرات التي يمكن أن تكون ثابتة (const).
    # prefer_final_fields: true # تظهر خطًا أزرق تحت الحقول التي يمكن أن تكون نهائية (final).
    # prefer_const_constructors_in_immutables: true # تظهر خطًا أزرق تحت الويدجتس التي يمكن أن تكون ثابتة (const) في الفئات غير القابلة للتغيير (immutable classes).
    # sized_box_for_whitespace: true # تظهر خطًا أزرق تحت المساحات البيضاء (Container مثل ) التي يمكن استبدالها بويدجت SizedBox.
    # avoid_unnecessary_containers: true # تظهر خطًا أزرق تحت الحاويات (Container) التي لا تحتوي على أي خصائص أو تحتوي فقط على خصائص يمكن تحقيقها باستخدام ويدجت أبسط.

    # تمنع استخدام `print()` في الكود المنتج (production code) وتشجع على استخدام
    # حلول تسجيل (logging) أفضل مثل `logger` أو `debugPrint`.
    # avoid_print: true  # Uncomment to disable the `avoid_print` rule

    # تمنع استخدام `dynamic` كنوع، وتشجع على تحديد أنواع أكثر دقة لزيادة
    # الأمان في النوع (type safety).
    # avoid_dynamic_calls: true

    # تمنع استخدام `var` وتشجع على استخدام `final` أو `const` أو تحديد النوع
    # بشكل صريح لزيادة وضوح الكود.
    # prefer_final_in_for_each: true

    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule
# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
